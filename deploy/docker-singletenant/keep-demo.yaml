# Portcullis-Keep Demo Configuration (Unified Peer Model)
# See internal/keep/config.go for schema details.

mode: dev

server:
  endpoints:
    main:
      listen: "0.0.0.0:8080"
      auth:
        type: "bearer"
        credentials:
          bearer_token: "dev-secret-token"
      # tls:
      #   cert:      "/tls/keep-server.crt"
      #   key:       "/tls/keep-server.key"
      #   client_ca: "/tls/ca.crt"

identity:
  # Strategy: "oidc-file", "oidc-login", "hmac-verify", or "os"
  strategy: "oidc-verify"
  config:
    issuer: "http://localhost:5556/dex"
    jwks_url: "http://portcullis-dex:5556/dex/keys"
    allow_insecure_jwks_url: true
    audiences:
      - "portcullis-keep"
      - "portcullis-gate"
      - "portcullis-mcp"
    max_token_age_secs: 3600

# peers:
#  guard:
#    endpoints:
#      approval_ui: "http://localhost:8444"
#      token_api: "http://guard:8445"

responsibility:
  policy:
    strategy: "opa"
    config:
      endpoint: "http://opa:8181/v1/data/portcullis/tabular/decision"

  mcp_backends:
    - name: "mock-enterprise-api"
      type: "http"
      url: "http://mock-enterprise-api:3000/mcp"
      allow_private_addresses: true
      user_identity:
         placement:
           header: "X-User-Identity"
#           json_path: "identity_jwt"
      #   exchange:
      #     url: "http://identity-exchange:9000/exchange"
      #     timeout: 5
      #     cache:
      #       ttl: 300
      #       max_entries: 1000
      #     auth_headers:
      #       Authorization: "Bearer envvar://EXCHANGE_API_TOKEN"

    - name: "fetch"
      type: "http"
      url: "http://fetch-mcp:8080/mcp"
      allow_private_addresses: true
      # user_identity:
      #   placement:
      #     header: "X-User-Identity"

  issuance:
    signing_key: "dev-keep-signing-secret"
    ttl: 86400

#  workflow:
#    strategy: "url"
#    config:
#      endpoints:
#        approval_ui: "http://localhost:8444"

operations:
  storage:
    backend: "memory"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-keep"

  logging:
    level: "debug"
    format: "text"
