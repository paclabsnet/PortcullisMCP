# Gate configuration for the Docker sandbox demo (Unified Peer Model).
#
# Gate runs on the host machine (launched by your MCP client via stdio).
# Copy this file to ~/.portcullis/gate.yaml and adjust paths as needed.
#
# By default Gate connects to Keep over plain HTTP with a shared bearer token.
# To use mTLS instead, comment out the bearer block and uncomment the mtls block.

# dev mode relaxes security constraints, vs mode: production , which will not function
# without various security capabilities enabled
#
mode: dev

#
#  single tenancy means a single user.  You can have a Portcullis-Gate supporting
#  a single user, but supporting multiple agents, but setting up the mcp endpoint
#
tenancy: single

server:
  endpoints:
    management_ui:
      listen: "localhost:7777"
      auth:
        type: "none"


#
# You can have both a management_ui (for the human) and the mcp endpoint (for the Agents)
#
#server:
#  endpoints:
#    mcp:
#      listen: "0.0.0.0:9090"




identity:
  # Strategy: "oidc-file", "oidc-login", or "os"
  strategy: "oidc-login"
  config:
    issuer_url: "http://localhost:5556/dex"
    client_id: "portcullis-gate"
    client_secret: "portcullis-gate-secret"
    scopes:
      - "openid"
      - "profile"
      - "email"
      - "groups"
      - "audience:server:client_id:portcullis-keep"
    flow: "authorization_code"

peers:
  keep:
    endpoint: "http://localhost:8080"
    auth:
      type: "bearer"
      credentials:
        bearer_token: "dev-secret-token" # must match listen.auth.bearer_token in keep-demo.yaml

  # mTLS alternative — enable after uncommenting the tls: block in keep-demo.yaml
  # and changing the endpoint scheme to https://.
  #
  # endpoint: "https://localhost:8080"
  # auth:
  #   type: "mtls"
  #   credentials:
  #     cert:      "/path/to/deploy/docker-singletenant/tls/gate-client.crt"
  #     key:       "/path/to/deploy/docker-singletenant/tls/gate-client.key"
  #     server_ca: "/path/to/deploy/docker-singletenant/tls/ca.crt"

  guard:
    endpoints:
      approval_ui: "http://localhost:8444" # UI: human approval page
      token_api: "http://localhost:8445"   # API: machine-to-machine calls
    auth:
      type: "bearer"
      credentials:
        bearer_token: "dev-guard-token"

responsibility:
  tools:
    portcullis-localfs:
      enabled: true
      workspace:
        # this list of allowed directories is up to you and your organization's policies
        directories:
          - "~/sandbox"
          - "C:/projects"
          - "C:/tmp"
          - "/tmp"
      forbidden:
        # these are the directories that the Agent should never be allowed to visit, even if
        # the parent is allowed.  This also should reflect your organization's policies, but
        # including ~/.ssh and ~/.portcullis is definitely recommended
        directories:
          - "~/.ssh"
          - "~/.portcullis"
          - "/etc"
  escalation:
    strategy: "proactive"
    poll_interval: 10
    token_store: "~/.portcullis/tokens.json"


  #
  # These messages are optional, if you don't include one, a default one is
  # used.
  #
  agent_interaction:
    instructions:
      require_approval: |
        Action required: {reason}

        Ask the user to open the following link to approve this request:
        {url}  

        Make sure you copy the URL exactly. A single missed character can make it invalid.

        Once approved, retry the operation.
      deny: |
        This action is not permitted: {reason}
        Reference trace ID {trace_id} when contacting your security team.



operations:
  telemetry:
    exporter: "noop"
  logging:
    level: "info"
    format: "text"
