# version: '3.8'

services:
  opa:
    image: openpolicyagent/opa:latest
    container_name: portcullis-opa
    ports:
      - "8181:8181"
    volumes:
      - ../../policies/rego:/policies
      - ./opa-config.yaml:/etc/opa/config.yaml:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--config-file=/etc/opa/config.yaml"
      - "--watch"
      - "--bundle"
      - "/policies/bundle.tar.gz"
    networks:
      - portcullis

  keep:
    build:
      context: ../..
      dockerfile: deploy/docker-singletenant/Dockerfile
      target: keep
      args:
        VERSION: ${VERSION:-0.4.1-dev}
    container_name: portcullis-keep
    ports:
      - "8080:8080"
    volumes:
      - ./keep-demo.yaml:/etc/portcullis/keep.yaml:ro
      - ./tls:/tls:ro   # mTLS certs (uncomment tls: block in keep-demo.yaml to activate)
    command: ["-config", "/etc/portcullis/keep.yaml"]
    depends_on:
      - opa
      - mock-enterprise-api
      - fetch-mcp
    networks:
      - portcullis

  redis:
    image: redis:7-alpine
    container_name: portcullis-redis
    # requirepass sets the AUTH password; change in production.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-portcullis-dev-secret}", "--loglevel", "notice"]
    ports:
      - "6379:6379"
    networks:
      - portcullis

  guard:
    build:
      context: ../..
      dockerfile: deploy/docker-singletenant/Dockerfile
      target: guard
      args:
        VERSION: ${VERSION:-0.4.1-dev}
    container_name: portcullis-guard
    ports:
      - "8444:8444"  # UI listener (human approval page)
      - "8445:8445"  # API listener (Gate machine calls)
    volumes:
      - ./guard-demo.yaml:/etc/portcullis/guard.yaml:ro
      - ./tls:/tls:ro   # mTLS certs (enable in guard-demo.yaml to activate)
    command: ["-config", "/etc/portcullis/guard.yaml"]
    depends_on:
      - keep
      - redis
    networks:
      - portcullis

  mock-enterprise-api:
    build:
      context: ../..
      dockerfile: deploy/docker-singletenant/Dockerfile
      target: mock-enterprise-api
    container_name: portcullis-mock-enterprise-api
    networks:
      - portcullis

  fetch-mcp:
    build:
      context: ../..
      dockerfile: deploy/docker-singletenant/Dockerfile
      target: fetch-mcp
    container_name: portcullis-fetch-mcp
    networks:
      - portcullis

  dex:
    image: dexidp/dex:latest
    container_name: portcullis-dex
    ports:
      - "5556:5556"
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    networks:
      - portcullis

networks:
  portcullis:
    driver: bridge
