listen:
  address: "0.0.0.0:8080"
  auth:
    bearer_token: "dev-secret-token"

pdp:
  type: "opa"
  endpoint: "http://opa:8181/v1/data/portcullis/tabular/decision"



# passthrough mode (dev/PoC only): accepts all claims without verification.
# identity:
#   normalizer: "passthrough"
#   accept_forged_identities: true  # suppress per-request warnings

#
identity:
  normalizer: "oidc-verify"
  oidc_verify:
    issuer: "http://localhost:5556/dex"
    
    jwks_url: "http://portcullis-dex:5556/dex/keys"
   
    audiences:
      - "portcullis-keep"
      - "portcullis-gate"
   
    # Since we are using http:// for local dev, we must explicitly allow it
    allow_insecure_jwks_url: true
   
    # 6. Optional: Reject tokens older than 1 hour (iat claim)
    max_token_age_secs: 3600
    

#
# this is for  identity.normalizer: "oidc-file" 
# visit https://mock-idp.dev 
# if you want to mint new tokens with different attributes
#
#    issuer: "https://mock-idp.dev"             # Must match the 'iss' claim in your token
#    jwks_url: "https://mock-idp.dev/jwt/.well-known/jwks.json" # URL where Keep fetches public keys
#    audiences: ["portcullis-mcp"]              # Optional: must match the 'aud' claim  

backends:
  mock-enterprise-api:
    type: "http"
    url: "http://mock-enterprise-api:3000/mcp"
    allow_private_addresses: true  # Docker internal network
  fetch:
    type: "http"
    url: "http://fetch-mcp:8080/mcp"
    allow_private_addresses: true  # Docker internal network

escalation:
  workflow:
    type: "url"
    url:
      guard_url: "http://localhost:8444"  # browser-facing; must be reachable from the user's machine

escalation_request_signing:
  key: "dev-keep-signing-secret"
  ttl: 86400

decision_logs:
  enabled: true
  console: true
  buffer_size: 100
  flush_interval: 5
  max_batch_size: 50
