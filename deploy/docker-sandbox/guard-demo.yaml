listen:
  ui_address: "0.0.0.0:8444"
  # ui_tls:               # uncomment to enable TLS on the UI listener
  #   cert: "/tls/guard-server.crt"
  #   key:  "/tls/guard-server.key"
  api_address: "0.0.0.0:8445"
  # api_tls:              # uncomment to enable TLS on the API listener
  #   cert: "/tls/guard-server.crt"
  #   key:  "/tls/guard-server.key"

keep:
  pending_escalation_request_signing_key: "dev-keep-signing-secret"  # must match keep's escalation_request_signing.key

escalation_token_signing:
  key: "a-string-secret-at-least-256-bits-long"  # PDP must trust tokens signed with this key
  ttl: 86400

templates:
  dir: "/templates"

portcullis_gate_management_port: 7777

#
# Whether Gate instances can call the API without any credentials.
# Set auth.allow_unauthenticated: true for sandbox/dev only.
# In production, set auth.bearer_token or auth.mtls.client_ca (or both).
#
auth:
  allow_unauthenticated: true  # sandbox only
  # bearer_token: "shared-secret"
  # mtls:
  #   client_ca: "/tls/ca.crt"  # CA that signed Gate client certs

#
# Token store: use Redis so that pending escalations and unclaimed tokens
# survive a Guard restart and are shared across Guard replicas.
# The password must match the --requirepass value in docker-compose.yml.
#
token_store:
  backend: "redis"
  redis:
    addr: "redis:6379"
    password: "portcullis-dev-secret"
