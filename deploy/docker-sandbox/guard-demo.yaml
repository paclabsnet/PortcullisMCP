# Portcullis-Guard Demo Configuration (Unified Peer Model)
# See internal/guard/config.go for schema details.

mode: dev

server:
  endpoints:
    approval_ui:
      listen: "0.0.0.0:8444"
      # tls:
      #   cert: "/tls/guard-server.crt"
      #   key:  "/tls/guard-server.key"

    token_api:
      listen: "0.0.0.0:8445"
      # In sandbox demo, we allow unauthenticated access for simplicity if not configured.
      # But establishing the pattern with a bearer token is better.
      auth:
        type: "bearer"
        credentials:
          bearer_token: "dev-guard-token"
      # mtls:
      #   client_ca: "/tls/ca.crt"

responsibility:
  issuance:
    approval_request_verification_key: "dev-keep-signing-secret"
    signing_key: "a-string-secret-at-least-256-bits-long"
    token_ttl: 86400

  interface:
    templates: "/templates"
    gate_management_port: 7777

operations:
  storage:
    backend: "redis"
    config:
      addr: "redis:6379"
      password: "portcullis-dev-secret"
      key_prefix: "portcullis:guard:"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-guard"

  logging:
    level: "debug"
    format: "text"
