# Portcullis Keep — multi-tenant demo configuration
#
# Keep validates bearer tokens presented by Gate's tenants against
# mock-idp.dev's public JWKS. No Guard or escalation in this stack.

mode: dev

server:
  endpoints:
    main:
      listen: "0.0.0.0:8080"
      auth:
        type: "bearer"
        credentials:
          bearer_token: "dev-secret-token"   # this could also reference a vault:// or an envvar://


#
#  hmac-verify :  use this when the Agent is given a JWT at startup representing the identity of the
#                 user. The agent will send the JWT as a header, typically a bearer header, but it could
#                 be a custom header, and that's supported as well.
#
#
identity:
  strategy: "hmac-verify"
  config:
    issuer: "https://mock-idp.dev"
    jwks_url: "https://mock-idp.dev/jwt/.well-known/jwks.json"
    audiences:
      - "portcullis-mcp"

responsibility:
  policy:
    strategy: "opa"
    config:
      endpoint: "http://opa:8181/v1/data/portcullis/tabular/decision"

  mcp_backends:
    - name: "mock-enterprise-api"
      type: "http"
      url: "http://mock-enterprise-api:3000/mcp"
      allow_private_addresses: true

    - name: "fetch"
      type: "http"
      url: "http://fetch-mcp:8080/mcp"
      allow_private_addresses: true

  issuance:
    signing_key: "dev-keep-signing-secret"
    ttl: 86400


# 
# if the JWT identities from the Agents are in a more or less normal form, Keep
# can automatically translate them from claims into a Principal that can be used
# for authorization.
#
# However, if the claims are unusual, fear not - you can set up a webhook of your
# own that can perform the translation.  The only drawback is that this translation
# is relatively slow, so we offer a Principal cache to limit that translation overhead
# 
# In production, you'll want to use redis
#
operations:
  storage:
    backend: "memory"
#    config:
#      addr: "redis:6379"
#      password: "portcullis-dev-secret"
#      key_prefix: "portcullis:keep:"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-keep"

  logging:
    level: "info"
    format: "text"
