services:
  opa:
    image: openpolicyagent/opa:latest
    container_name: portcullis-mt-opa
    volumes:
      - ../../policies/rego:/policies
      - ./opa-config.yaml:/etc/opa/config.yaml:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--config-file=/etc/opa/config.yaml"
      - "--watch"
      - "--bundle"
      - "/policies/bundle.tar.gz"
    networks:
      - portcullis-mt

  keep:
    build:
      context: ../..
      dockerfile: deploy/docker-multitenant/Dockerfile
      target: keep
      args:
        VERSION: ${VERSION:-0.4.2-dev}
    container_name: portcullis-mt-keep
    volumes:
      - ./keep-demo.yaml:/etc/portcullis/keep.yaml:ro
    command: ["-config", "/etc/portcullis/keep.yaml"]
    depends_on:
      - opa
      - mock-enterprise-api
      - fetch-mcp
    networks:
      - portcullis-mt

  gate:
    build:
      context: ../..
      dockerfile: deploy/docker-multitenant/Dockerfile
      target: gate
      args:
        VERSION: ${VERSION:-0.4.2-dev}
    container_name: portcullis-mt-gate
    ports:
      - "9090:9090"
    volumes:
      - ./gate-demo.yaml:/etc/portcullis/gate.yaml:ro
    command: ["-config", "/etc/portcullis/gate.yaml"]
    depends_on:
      - keep
    networks:
      - portcullis-mt

  mock-enterprise-api:
    build:
      context: ../..
      dockerfile: deploy/docker-multitenant/Dockerfile
      target: mock-enterprise-api
    container_name: portcullis-mt-mock-enterprise-api
    networks:
      - portcullis-mt

  fetch-mcp:
    build:
      context: ../..
      dockerfile: deploy/docker-multitenant/Dockerfile
      target: fetch-mcp
    container_name: portcullis-mt-fetch-mcp
    networks:
      - portcullis-mt

networks:
  portcullis-mt:
    driver: bridge
