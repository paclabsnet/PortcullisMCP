# portcullis-gate minimal config — for local development/evaluation (Unified Peer Model)
#
# AGENT CONFIGURATION
# portcullis-gate is launched automatically by your AI agent as an MCP server.
# Do not run it manually. Configure your agent as follows:
#
# Claude Code (~/.claude.json or project .claude.json):
#   {
#     "mcpServers": {
#       "portcullis": {
#         "command": "portcullis-gate",
#         "args": ["-config", "/path/to/gate.yaml"]
#       }
#     }
#   }
#
# VS Code (settings.json, under "mcp.servers"):
#   "portcullis": {
#     "command": "portcullis-gate",
#     "args": ["-config", "/path/to/gate.yaml"]
#   }
#
# Any MCP-compatible agent that supports stdio transport uses the same pattern:
# command = portcullis-gate, args = [-config, /path/to/gate.yaml]

#
# THIS IS THE OIDC TOKEN file variant, using mock-idp.dev as the issuer.  You will need to do the following:
# 1) create your own static JWT at https://mock-idp.dev   (free!)  OR copy the one in docs/demo-oidc-token.md
# 2) put this token in ~/.portcullis/oidc-token      (by default, you can configure below)
# 3) make sure that you use the matching identity.strategy: oidc-file config for Portcullis-Keep
#

server:
  endpoints:
    management_ui:
      listen: "localhost:7777"
      auth:
        type: "none"

identity:
  strategy: "oidc-file"
  config:
    token_file: "~/.portcullis/oidc-token"

peers:
  keep:
    endpoint: "http://localhost:8080"
    auth:
      type: "bearer"
      credentials:
        bearer_token: "dev-secret-token"

  guard:
    endpoints:
      approval_ui: "http://localhost:8444"
      token_api: "http://localhost:8445"

responsibility:
  workspace:
    directory: "~"
  forbidden:
    directories:
      - "~/.ssh"
      - "~/.portcullis"
  escalation:
    strategy: "user-driven"
    token_store: "~/.portcullis/tokens.json"
  # decision_logs:
  #   flush_interval: 30
  #   max_batch_size: 100
  # agent_interaction:
  #   instructions:
  #     require_approval: |
  #       Action required: {reason}
  #       Approve at: {url}
  #       Trace ID: {trace_id}
  #     deny: |
  #       This action is not permitted: {reason}
  #       Reference trace ID {trace_id} when contacting your security team.

operations:
  telemetry:
    exporter: "noop"
  logging:
    level: "info"
    format: "text"
