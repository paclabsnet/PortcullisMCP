keep:
  endpoint: "http://localhost:8080"
  auth:
    type: "bearer"
    token: "dev-secret-token"  # must match keep's bearer_token

identity:
  source: "os"  # Use OS username for local testing
  # Optional overrides for testing different user scenarios:
  user_id: "alice@example.com"      # Override OS username
  display_name: "Alice Developer"   # Override display name
  groups:                            # Specify groups for policy testing
    - "developers"
    - "qa-team"

sandbox:
  directory: "."  # Current directory as sandbox

protected_paths:
  - ".git"
  - ".portcullis"

management_api:
  port: 7777

token_store: ".portcullis/tokens.json"

decision_logs:
  flush_interval: 30  # seconds between sending logs to Keep (default: 30)
  max_batch_size: 100
