# Portcullis-Guard Minimal Configuration (Unified Peer Model)
# See internal/guard/config.go for schema details.

server:
  endpoints:
    approval_ui:
      listen: "127.0.0.1:8444"
    token_api:
      listen: "127.0.0.1:8445"
      # For minimal/dev, we could allow unauthenticated API access if needed,
      # but it's better to establish the pattern.
      auth:
        type: "bearer"
        credentials:
          bearer_token: "dev-guard-token"

responsibility:
  issuance:
    approval_request_verification_key: "dev-keep-signing-secret"
    signing_key: "dev-guard-signing-secret"
    token_ttl: 3600

  interface:
    templates: "./internal/guard/templates"
    gate_management_port: 7777

operations:
  storage:
    backend: "memory"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-guard"

  logging:
    level: "debug"
    format: "text"
