listen:
  address: "127.0.0.1:8444"

keep:
  pending_escalation_request_signing_key: "dev-keep-signing-secret"   # must match keep.signing.key; use ${ENV_VAR} in production

escalation_token_signing:
  key: "dev-guard-signing-secret"   # PDP must be configured to trust tokens signed with this key; use ${ENV_VAR} in production
  ttl: 3600                         # short TTL for local testing

templates:
  dir: "./internal/guard/templates"   # adjust to match your working directory

portcullis_gate_management_port: 7777

auth:
  allow_unauthenticated_token_apis: true  # development only — remove in production
