# IMPORTANT: In production, place Guard behind a corporate SSO proxy (Cloudflare
# Access, Pomerium, nginx+oauth2-proxy, etc.) to prevent agents from self-approving
# escalations by fetching the approval URL programmatically. The proxy enforces
# browser-based SSO on /approve; the bearer-token-protected API endpoints
# (/token/*, /pending) should remain directly reachable by Gate only.
# See docs/guard-sso-proxy.md for deployment examples.
listen:
  address: "0.0.0.0:8444"

keep:
  pending_escalation_request_signing_key: "envvar://KEEP_SIGNING_KEY"   # must match keep.signing.key

escalation_token_signing:
  key: "envvar://GUARD_SIGNING_KEY"          # PDP must be configured to trust tokens signed with this key
  ttl: 86400                           # escalation token TTL in seconds (default: 86400 = 24h)

templates:
  dir: "/etc/portcullis/guard/templates"

#
# 
#
portcullis_gate_management_port: 7777   # gate management API port, shown in post-approval instructions

# Authentication for the /token/unclaimed/list and /token/deposit endpoints.
# bearer_token is required unless allow_unauthenticated is explicitly set to true (development only).
auth:
  bearer_token: "envvar://GUARD_BEARER_TOKEN"
  allow_unauthenticated: false

# Token store: selects where pending escalation requests and unclaimed tokens
# are held.  "memory" (default) is single-instance only; "redis" is required
# for HA deployments with multiple Guard instances.
token_store:
  backend: "memory"      # "memory" or "redis"
  ttl: 3600              # default token lifetime in seconds when expiry cannot be parsed (default: 3600)
  cleanup_interval: 300  # how often the memory store prunes expired entries (default: 300); no effect for redis

  # Redis settings — required when backend is "redis".
  # redis:
  #   addr: "redis.internal:6379"          # host:port of the Redis server
  #   password: "envvar://REDIS_PASSWORD"  # AUTH password (optional)
  #   db: 0                                # logical database index (default: 0)
  #   tls_enabled: false                   # set true for Redis Enterprise / Upstash / TLS-terminated Redis
  #   tls_skip_verify: false               # disable cert verification (dev only — never use in production)
  #   tls_ca_cert: ""                      # path to CA PEM for verifying the Redis server cert
  #   key_prefix: "portcullis:guard:"      # namespace prefix; override to share a Redis instance

