# Portcullis-Guard Example Configuration (Unified Peer Model)
# See internal/guard/config.go for schema details.

server:
  endpoints:
    approval_ui:
      listen: "0.0.0.0:8444"
      # In production, place this endpoint behind an SSO proxy.
      # See docs/guard-sso-proxy.md for details.

    token_api:
      listen: "0.0.0.0:8445"
      auth:
        type: "bearer"
        credentials:
          bearer_token: "envvar://GUARD_BEARER_TOKEN"

responsibility:
  issuance:
    approval_request_verification_key: "envvar://KEEP_SIGNING_KEY"   # must match keep's issuance key
    signing_key: "envvar://GUARD_SIGNING_KEY"                      # PDP must trust tokens signed with this key
    token_ttl: 86400

  interface:
    templates: "/etc/portcullis/guard/templates"
    gate_management_port: 7777

operations:
  storage:
    backend: "memory"
    # For HA deployments, use redis:
    # backend: "redis"
    # config:
    #   addr: "redis.internal:6379"
    #   password: "envvar://REDIS_PASSWORD"
    #   key_prefix: "portcullis:guard:"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-guard"

  logging:
    level: "info"
    format: "json"

  # limits:
  #   max_request_body_bytes: 524288
