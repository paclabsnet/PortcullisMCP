# portcullis-gate minimal config — for local development/evaluation
#
# AGENT CONFIGURATION
# portcullis-gate is launched automatically by your AI agent as an MCP server.
# Do not run it manually. Configure your agent as follows:
#
# Claude Code (~/.claude.json or project .claude.json):
#   {
#     "mcpServers": {
#       "portcullis": {
#         "command": "portcullis-gate",
#         "args": ["-config", "/path/to/gate.yaml"]
#       }
#     }
#   }
#
# VS Code (settings.json, under "mcp.servers"):
#   "portcullis": {
#     "command": "portcullis-gate",
#     "args": ["-config", "/path/to/gate.yaml"]
#   }
#
# Any MCP-compatible agent that supports stdio transport uses the same pattern:
# command = portcullis-gate, args = [-config, /path/to/gate.yaml]

#
# THIS IS THE OIDC TOKEN variant, using mock-idp.dev as the issuer.  You will need to do the following:
# 1) create your own static JWT at https://mock-idp.dev   (free!)  OR copy the one in docs/demo-oidc-token.md
# 2) put this token in ~/.portcullis/oidc-token      (by default, you can configure below)
# 3) make sure that you use the oidc version of the Portcullis-Keep config as well
#
#

keep:
  endpoint: "http://localhost:8080"
  auth:
    type: "bearer"
    token: "dev-secret-token"   # must match keep's bearer_token setting



identity:
  source: "oidc"                # oidc token issued by mock-idp.dev
  oidc:
    token_file: ~/.portcullis/oidc-token        # change this if you like



# Guard endpoint for automatic escalation token collection.
# When configured, Gate will automatically claim tokens approved via the Guard
# without the user needing to paste tokens manually.
guard:
  endpoint: "http://localhost:8444"
  # bearer_token: "dev-guard-bearer-token" # not needed if guard has no bearer_token set

sandbox:
  directory: "~"                # files under home dir are fast-pathed (no Keep round-trip)

# protected_paths:              # always denied, regardless of sandbox; defaults to ~/.ssh and ~/.portcullis
#   - "~/.ssh"
#   - "~/.portcullis"

# token_store: "~/.portcullis/tokens.json"   # where escalation tokens are persisted

# management_api:
#   port: 7777                  # localhost-only HTTP API for token management

# decision_logs:
#   flush_interval: 30          # seconds between batched sends to Keep (default: 30)
#   max_batch_size: 100         # max entries per batch (default: 100)

