# Portcullis-Keep minimal config — OIDC demo version (Unified Peer Model)
# using a mock iDp for testing purposes. Visit https://mock-idp.dev if you want to create new tokens

mode: dev

server:
  endpoints:
    main:
      listen: "127.0.0.1:8080"
      # TLS disabled for local testing - uncomment to enable
      # tls:
      #   cert: "/etc/portcullis/keep.crt"
      #   key:  "/etc/portcullis/keep.key"
      #   client_ca: "/etc/portcullis/client-ca.crt"
      auth:
        type: "bearer"
        credentials:
          bearer_token: "dev-secret-token" # shared secret for local testing

identity:
  strategy: "oidc-verify"
  config:
    issuer: "https://mock-idp.dev" # Must match the 'iss' claim in your token
    jwks_url: "https://mock-idp.dev/jwt/.well-known/jwks.json" # Must be https:// in production
    audiences: ["portcullis-mcp"] # Optional: must match the 'aud' claim
    # allow_insecure_jwks_url: true            # Permits http:// jwks_url — dev/test only

peers:
  guard:
    endpoints:
      approval_ui: "http://localhost:8444"
      token_api: "http://localhost:8445"

responsibility:
  policy:
    # strategy: "noop" allows all requests without a policy engine - useful for getting started.
    # Switch to strategy: "opa" with a real endpoint for any real deployment.
    strategy: "noop"
    # config:
    #   endpoint: "http://localhost:8181/v1/data/portcullis/decision"

  mcp_backends:
    # HTTP MCP backend for demo - run the mock server with:
    #   go run ./examples/mock-enterprise-api
    - name: "mock-enterprise-api"
      type: "http"
      url: "http://localhost:3000/mcp"
      allow_private_addresses: true # localhost is loopback; fine for local dev

  issuance:
    signing_key: "dev-keep-signing-secret" # must match guard's responsibility.issuance.approval_request_verification_key
    ttl: 3600

  workflow:
    strategy: "url"
    config:
      endpoints:
        approval_ui: "http://localhost:8444"

operations:
  storage:
    backend: "memory"
    config:
      decision_log:
        enabled: true
        console: true # Log to console for development
        buffer_size: 100
        flush_interval: 5
        max_batch_size: 50

  telemetry:
    exporter: "noop"
  logging:
    level: "info"
    format: "text"
