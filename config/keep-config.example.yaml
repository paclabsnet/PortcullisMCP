listen:
  address: "0.0.0.0:8443"
  tls:
    cert: "/etc/portcullis/keep.crt"
    key:  "/etc/portcullis/keep.key"
    client_ca: "/etc/portcullis/client-ca.crt"   # for mTLS gate auth
  auth:
    bearer_token: ""  # optional shared secret; leave empty to disable bearer auth
                       # use mTLS (client_ca) or bearer_token, or both for defense-in-depth; omit to use bearer only

pdp:
  # Supported types:
  #   opa  - Open Policy Agent REST API (recommended for production)
  #   noop - allow all requests unconditionally (getting started / local dev only)
  type: "opa"
  endpoint: "http://opa.internal.example.com:8181/v1/data/portcullis/tabular/decision"

# Identity enforcement controls how Keep handles the UserIdentity claims sent by Gate.
identity:
  # Normalizer selects the identity normalization strategy.
  #   "strict" (default) — OS-sourced identities are stripped to user_id only.
  #                        OIDC-sourced identities pass through unchanged.
  #   "passthrough"      — All identity fields are accepted as-is. Local
  #                        evaluation and sandbox deployments only.
  #   "oidc-verify"      — Rejects expired OIDC tokens and tokens not issued
  #                        by the configured issuer. OS identities are handled
  #                        with strict stripping.
  normalizer: "strict"

  # accept_forged_identities suppresses the per-request warning emitted in
  # passthrough mode. Has no effect on other normalizers.
  # accept_forged_identities: false

  # Settings for oidc-verify normalizer
  # oidc_verify:
  #   issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"

backends:
  # stdio backends are useful for local development/testing
  # but enterprise deployments typically use HTTP
  github:
    type: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

  # Streamable HTTP backends (current MCP standard, preferred for new deployments)
  fetch:
    type: "http"
    url: "http://localhost:8080/mcp"

  enterprise-api:
    type: "http"
    url: "https://mcp-api.internal.example.com/mcp"
    # tool_map renames backend tools before presenting them to the agent and PDP.
    # Use this when two backends share a tool name, or to apply a namespace prefix
    # so tool names are self-describing in policies.
    # Key is the real name on the backend; value is the alias agents and policies see.
    # Aliases must be unique across all backends — a duplicate is a startup error.
    tool_map:
      query_database: "enterprise_query_database"
      list_orders:    "enterprise_list_orders"

escalation_request_signing:
  key: "${KEEP_SIGNING_KEY}"   # must match guard's keep.escalation_request_signing_key; use ${ENV_VAR} in production
  ttl: 3600                    # escalation request JWT TTL in seconds (default: 3600)

escalation:
  workflow:
    type: "url"         # "url" sends approval link through MCP channel to the user via portcullis-guard
    url:
      guard_url: "https://portcullis-guard.internal.example.com"
    # servicenow:       # uncomment to use ServiceNow workflow instead
    #   instance: "example.service-now.com"
    #   credential_env: "${SNOW_CREDENTIALS}"
    # webhook:          # uncomment to use a generic webhook instead
    #   url: "https://hooks.internal.example.com/portcullis"
    #   headers:
    #     Authorization: "Bearer ${WEBHOOK_TOKEN}"

decision_logs:
  enabled: true
  buffer_size: 10000           # channel buffer size (default: 10000)
  flush_interval: 5            # seconds between flushes (default: 5)
  max_batch_size: 1000         # max entries per batch (default: 1000)
  console: false               # also log to console (default: false)
  url: "https://siem.internal.example.com/api/v1/logs"
  headers:
    Authorization: "Bearer ${SIEM_API_TOKEN}"
    X-Source: "portcullis-keep"

telemetry:
  # Supported exporters:
  #   noop   - no telemetry (default)
  #   stdout - print spans to stdout (development)
  #   otlp   - send to an OTLP collector (production)
  exporter: "noop"
  service_name: "portcullis-keep"
  # otlp:
  #   endpoint: "http://otel-collector.internal.example.com:4318"  # OTLP HTTP endpoint
  #   insecure: true  # set false (default) to require TLS
