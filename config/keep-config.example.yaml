listen:
  address: "0.0.0.0:8443"
  tls:
    cert: "/etc/portcullis/keep.crt"
    key:  "/etc/portcullis/keep.key"
    client_ca: "/etc/portcullis/client-ca.crt"   # for mTLS gate auth
  auth:
    bearer_token: ""  # optional shared secret; leave empty to disable bearer auth
                       # use mTLS (client_ca) or bearer_token, or both for defense-in-depth; omit to use bearer only

pdp:
  type: "opa"
  endpoint: "http://opa.internal.example.com:8181/v1/data/portcullis/decision"

backends:
  # stdio backends are useful for local development/testing
  # but enterprise deployments typically use HTTP
  github:
    type: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

  # Streamable HTTP backends (current MCP standard, preferred for new deployments)
  fetch:
    type: "http"
    url: "http://localhost:8080/mcp"

  enterprise-api:
    type: "http"
    url: "https://mcp-api.internal.example.com/mcp"

  # Legacy SSE backends (deprecated MCP transport, for existing servers not yet migrated)
  legacy-service:
    type: "sse"
    url: "https://mcp-legacy.internal.example.com/sse"

escalation_request_signing:
  key: "${KEEP_SIGNING_KEY}"   # must match guard's keep.escalation_request_signing_key; use ${ENV_VAR} in production
  ttl: 3600                    # escalation request JWT TTL in seconds (default: 3600)

escalation:
  workflow:
    type: "url"         # "url" sends approval link through MCP channel to the user via portcullis-guard
    url:
      guard_url: "https://portcullis-guard.internal.example.com"
    # servicenow:       # uncomment to use ServiceNow workflow instead
    #   instance: "example.service-now.com"
    #   credential_env: "${SNOW_CREDENTIALS}"
    # webhook:          # uncomment to use a generic webhook instead
    #   url: "https://hooks.internal.example.com/portcullis"
    #   headers:
    #     Authorization: "Bearer ${WEBHOOK_TOKEN}"

decision_logs:
  enabled: true
  buffer_size: 10000           # channel buffer size (default: 10000)
  flush_interval: 5            # seconds between flushes (default: 5)
  max_batch_size: 1000         # max entries per batch (default: 1000)
  console: false               # also log to console (default: false)
  url: "https://siem.internal.example.com/api/v1/logs"
  headers:
    Authorization: "Bearer ${SIEM_API_TOKEN}"
    X-Source: "portcullis-keep"
