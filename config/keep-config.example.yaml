# Portcullis-Keep Example Configuration (Unified Peer Model)
# See internal/keep/config.go for schema details.

mode: dev

server:
  endpoints:
    main:
      listen: "0.0.0.0:8443"
      tls:
        cert: "/etc/portcullis/keep.crt"
        key:  "/etc/portcullis/keep.key"
        client_ca: "/etc/portcullis/client-ca.crt"   # for mTLS gate auth
      auth:
        type: "mtls"


identity:
  # Normalizer is required: "passthrough" (dev only) or "oidc-verify" (production)
  strategy: "oidc-verify"
  config:
    issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
    jwks_url: "https://login.microsoftonline.com/<tenant-id>/discovery/v2.0/keys"

peers:
  guard:
    endpoints:
      approval_ui: "https://guard.internal.example.com"
      token_api: "https://guard-api.internal.example.com"

responsibility:
  policy:
    strategy: "opa"
    config:
      endpoint: "http://opa.internal.example.com:8181/v1/data/portcullis/tabular/decision"

  mcp_backends:
    - name: "github"
      type: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_TOKEN: "your-github-token-here"

    - name: "fetch"
      type: "http"
      url: "http://localhost:8080/mcp"

    - name: "enterprise-api"
      type: "http"
      url: "https://mcp-api.internal.example.com/mcp"
      tool_map:
        query_database: "enterprise_query_database"
        list_orders:    "enterprise_list_orders"

  issuance:
    signing_key: "envvar://KEEP_SIGNING_KEY"   # must match guard's verification key
    ttl: 3600

  workflow:
    strategy: "url"
    config:
      endpoints:
        approval_ui: "https://guard.internal.example.com"

#
# In the future, we may want a way to reload the configuration at runtime, but
# it is complex to get right, and easy enough to avoid with a rolling restart in 
# a production environment
#
#  admin:
#    token: "envvar://KEEP_ADMIN_TOKEN"

operations:
  storage:
    backend: "memory"
    config:
      decision_log:
        enabled: true
        buffer_size: 10000
        flush_interval: 5
        max_batch_size: 1000
        console: false
        url: "https://siem.internal.example.com/api/v1/logs"
        headers:
          Authorization: "Bearer your-siem-api-token-here"
          X-Source: "portcullis-keep"

  telemetry:
    exporter: "noop"
    service_name: "portcullis-keep"

  logging:
    level: "info"
    format: "json"

  # limits:
  #   max_request_body_bytes: 1048576
