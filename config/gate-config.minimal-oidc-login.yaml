#
#  OIDC Login Version (Unified Peer Model)
#
#  This is the version of gate.yaml that is compatible with the docker-sandbox deployment. 
#  It will require a login to the portcullis-dex container, collect an oidc-token from
#  Dex, and then send that token along with requests to portcullis-keep.  Keep will be
#  able to validate that Dex created the token, and trust it.
#
#  And if there are escalations, the configuration below will also interact
#  with Portcullis-Guard for escalations.  This particular file is the full
#  demo, with all of the moving parts
#
#  If you want to run the whole demo
#  1. copy this file into ~/.portcullis/gate.yaml  
#  2. make demo-start      # in the main PortcullisMCP directory
#  3. set up the configuration for your agent to be aware of PortcullisMCP
#  4. Start up your agent
#  5. Tell your agent that you'd like to log in to Portcullis.  It should be able to figure out the rest
#

# portcullis-gate minimal config — for local development/evaluation
# MCP client config: { "command": "portcullis-gate", "args": ["-config", "~/.portcullis/gate.yaml"] }

server:
  endpoints:
    management_ui:
      listen: "localhost:7777"
      auth:
        type: "none"

identity:
  strategy: "oidc-login"
  config:
    issuer_url: "http://localhost:5556/dex" # Use your Dex or other OIDC provider URL
    client_id: "portcullis-gate"
    client_secret: "portcullis-gate-secret"
    scopes: ["openid", "profile", "email", "groups", "audience:server:client_id:portcullis-keep"]
    flow: "authorization_code"
  login_callback_timeout_seconds: 300

peers:
  keep:
    endpoint: "http://localhost:8080"
    auth:
      type: "bearer"
      credentials:
        bearer_token: "dev-secret-token" # must match keep's bearer_token setting

  guard:
    endpoints:
      approval_ui: "http://localhost:8444"
      token_api: "http://localhost:8445"

responsibility:
  workspace:
    directory: "~" # files under home dir are fast-pathed (no Keep round-trip)
  escalation:
    strategy: "proactive"
    token_store: "~/.portcullis/tokens.json"
  agent_interaction:
    instructions:
      require_approval: |
        Action required: {reason}

        Ask the user to open the following link to approve this request:
        {url}  

        Make sure you copy the URL exactly. A single missed character can make it invalid.

        Once approved, retry the operation.
      deny: |
        This action is not permitted: {reason}
        Reference trace ID {trace_id} when contacting your security team.

# restrictions:              # always denied, regardless of workspace; defaults to ~/.ssh and ~/.portcullis
#   - "~/.ssh"
#   - "~/.portcullis"

# token_store: "~/.portcullis/tokens.json"   # where escalation tokens are persisted

# decision_logs:
#   flush_interval: 30          # seconds between batched sends to Keep (default: 30)
#   max_batch_size: 100         # max entries per batch (default: 100)

operations:
  telemetry:
    exporter: "noop"
  logging:
    level: "info"
    format: "text"
