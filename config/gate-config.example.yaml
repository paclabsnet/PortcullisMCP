keep:
  endpoint: "https://portcullis.internal.example.com"
  auth:
    type: "mtls"          # or "bearer"
    cert: "~/.portcullis/gate.crt"
    key:  "~/.portcullis/gate.key"
    # token: ""           # used when type is "bearer"
    # server_ca: ""       # path to CA cert for verifying Keep's TLS certificate (required for private/enterprise CAs)

identity:
  source: "oidc"          # or "os" (testing/evaluation only)
  oidc:
    token_file: "~/.portcullis/oidc-token"  # refreshed by enterprise SSO tooling
  # When source is "os", these optional fields allow testing different user scenarios:
  # user_id: "alice@example.com"      # override OS username
  # display_name: "Alice Developer"   # override display name
  # groups: ["developers", "admin"]   # assign groups for policy testing

sandbox:
  directory: "~/.portcullis/sandbox"

protected_paths:
  - "~/.ssh"
  - "~/.portcullis"
  - "/etc"

management_api:
  port: 7777              # localhost only
  # shared_secret: ""    # optional; leave empty to disable auth on management API

token_store: "~/.portcullis/tokens.json"

decision_logs:
  flush_interval: 30  # seconds between sending logs to Keep (default: 30)
  max_batch_size: 100 # max entries per batch (default: 100)

# Guard endpoint for automatic escalation token collection.
# When configured, Gate will automatically claim tokens approved via the Guard
# web UI or deposited by remote workflows (e.g. ServiceNow), without the user
# needing to paste tokens manually via the management API.
guard:
  # escalation_approval_endpoint is the human-facing Guard URL shown to users
  # in approval links. In production, point this at your SSO proxy address so
  # agents cannot self-approve escalations. See docs/guard-sso-proxy.md.
  escalation_approval_endpoint: "https://guard.internal.example.com"

  # token_api_endpoint is the machine-to-machine URL Gate uses for API calls
  # (/token/unclaimed/list, /token/claim, /pending). Set this to Guard's direct
  # internal address when the SSO proxy is on a separate hostname. Defaults to
  # escalation_approval_endpoint when unset.
  # token_api_endpoint: "https://guard-api.internal.example.com"

  bearer_token: "envvar://GUARD_BEARER_TOKEN"  # must match guard.auth.bearer_token
  poll_interval: 60  # seconds between polls of /token/unclaimed/list (default: 60)

  # approval_management_strategy controls how Gate presents the escalation
  # approval URL to the agent.
  #
  # "user-driven" (default): Gate builds a ?token=<jwt> URL. The full signed
  #   JWT is embedded in the query string. Simple, but long URLs may be mangled
  #   by some AI clients when rendered as clickable links.
  #
  # "proactive": Gate pushes the signed JWT to Guard immediately via
  #   POST /pending and then builds a short ?jti=<uuid> URL instead.
  #   Eliminates URL mangling at the cost of one extra Guard round-trip per
  #   escalation. If Guard is unreachable when Gate attempts the push, the
  #   agent receives an error asking the user to try again later.
  #
  # approval_management_strategy: "proactive"

# agent controls the messages Gate returns to the AI agent for deny, escalation,
# and workflow responses. Each instructions field is a template; omit any
# placeholder to hide that information from the agent.
#
# Supported placeholders:
#   approval.instructions: {reason}, {url}, {trace_id}
#   deny.instructions:     {reason}, {trace_id}
#
# agent:
#
#   # Message shown when escalation or workflow approval is required.
#   # Default:
#   #   Escalation required: {reason}
#   #
#   #   Present this complete URL to the user so they can click it to approve
#   #   the request. Do not truncate or shorten the URL:
#   #   {url}
#   #
#   #   Trace ID: {trace_id}
#   require_approval:
#     instructions: |
#       Action required: {reason}
#
#       Ask the user to open the following link to approve this request:
#       {url}
#
#       Once approved, retry the operation. Trace ID: {trace_id}
#
#   # Message shown when a request is denied by policy.
#   # Default:
#   #   Access denied: {reason}
#   #
#   #   If you believe this is incorrect, contact your security team and
#   #   reference trace ID: {trace_id}
#   deny:
#     instructions: |
#       This action is not permitted: {reason}
#
#       To request access, contact your security team and quote trace ID: {trace_id}

telemetry:
  # Supported exporters:
  #   noop   - no telemetry (default)
  #   stdout - print spans to stdout (development)
  #   otlp   - send to an OTLP collector (production)
  exporter: "noop"
  service_name: "portcullis-gate"
  # otlp:
  #   endpoint: "http://otel-collector.internal.example.com:4318"  # OTLP HTTP endpoint
  #   insecure: true  # set false (default) to require TLS
