# Portcullis-Gate Example Configuration (Unified Peer Model)
# See internal/gate/config.go for schema details.

mode: dev

server:
  endpoints:
    management_ui:
      listen: "localhost:7777"
      auth:
        type: "none"  # for local/personal use; set to "bearer" or "mtls" if shared

identity:
  # Strategy: "oidc-file", "oidc-login", or "os"
  strategy: "oidc-file"
  config:
    token_file: "~/.portcullis/oidc-token"

peers:
  keep:
    endpoint: "https://portcullis.internal.example.com"
    auth:
      type: "mtls"
      credentials:
        cert: "~/.portcullis/gate.crt"
        key:  "~/.portcullis/gate.key"

  guard:
    endpoints:
      approval_ui: "https://guard.internal.example.com"
      token_api: "https://guard-api.internal.example.com"
    auth:
      type: "bearer"
      credentials:
        bearer_token: "envvar://GUARD_BEARER_TOKEN"

responsibility:
  workspace:
    directory: "~/sandbox"
  forbidden:
    directories:
      - "~/.ssh"
      - "~/.portcullis"
      - "/etc"
  escalation:
    strategy: "proactive"
    poll_interval: 60
    token_store: "~/.portcullis/tokens.json"
  decision_logs:
    flush_interval: 30
    max_batch_size: 100
  agent_interaction:
    instructions:
      require_approval: |
        Action required: {reason}
        Ask the user to open the following link to approve this request:
        {url}
        Once approved, retry the operation. Trace ID: {trace_id}
      deny: |
        This action is not permitted: {reason}
        To request access, contact your security team and quote trace ID: {trace_id}

operations:
  telemetry:
    exporter: "noop"
    service_name: "portcullis-gate"

  logging:
    level: "info"
    format: "text"
