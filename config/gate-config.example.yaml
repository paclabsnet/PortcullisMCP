keep:
  endpoint: "https://portcullis.internal.example.com"
  auth:
    type: "mtls"          # or "bearer"
    cert: "~/.portcullis/gate.crt"
    key:  "~/.portcullis/gate.key"
    # token: ""           # used when type is "bearer"
    # server_ca: ""       # path to CA cert for verifying Keep's TLS certificate (required for private/enterprise CAs)

identity:
  source: "oidc"          # or "os" (testing/evaluation only)
  oidc:
    token_file: "~/.portcullis/oidc-token"  # refreshed by enterprise SSO tooling
  # When source is "os", these optional fields allow testing different user scenarios:
  # user_id: "alice@example.com"      # override OS username
  # display_name: "Alice Developer"   # override display name
  # groups: ["developers", "admin"]   # assign groups for policy testing

sandbox:
  directory: "~/.portcullis/sandbox"

protected_paths:
  - "~/.ssh"
  - "~/.portcullis"
  - "/etc"

management_api:
  port: 7777              # localhost only
  # shared_secret: ""    # optional; leave empty to disable auth on management API

token_store: "~/.portcullis/tokens.json"

decision_logs:
  flush_interval: 30  # seconds between sending logs to Keep (default: 30)
  max_batch_size: 100 # max entries per batch (default: 100)
